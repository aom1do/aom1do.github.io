border-radius:6px;

<script>

function generateBackground(){

const container=document.getElementById("mapBackground");
container.innerHTML="";

const colors=["#b2f0e6","#ffd6d6","#fff3b0","#d4ccff"];

const svgNS="http://www.w3.org/2000/svg";
const svg=document.createElementNS(svgNS,"svg");

const width=window.innerWidth;
const height=window.innerHeight;

svg.setAttribute("viewBox",`0 0 ${width} ${height}`);

for(let i=0;i<35;i++){

const poly=document.createElementNS(svgNS,"polygon");

let points="";

const cx=Math.random()*width;
const cy=Math.random()*height;

const vertices=4+Math.floor(Math.random()*5);
const radius=120+Math.random()*200;

for(let j=0;j<vertices;j++){

const angle=(j/vertices)*Math.PI*2;
const r=radius*(0.5+Math.random()*0.9);

const x=cx+Math.cos(angle)*r;
const y=cy+Math.sin(angle)*r;

points+=`${x},${y} `;
}

poly.setAttribute("points",points);
poly.setAttribute("fill",colors[Math.floor(Math.random()*colors.length)]);
poly.setAttribute("opacity","0.35");

svg.appendChild(poly);

}

container.appendChild(svg);

}

generateBackground();
window.addEventListener("resize",generateBackground);

const sections=document.querySelectorAll("section");

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

sections.forEach(sec=>observer.observe(sec));

const shelf=document.getElementById("bookshelf");

document.querySelector(".book-btn.left")
.addEventListener("click",()=>{
shelf.scrollBy({left:-300,behavior:"smooth"});
});

document.querySelector(".book-btn.right")
.addEventListener("click",()=>{
shelf.scrollBy({left:300,behavior:"smooth"});
});

/* ===== スマホ用ツールチップ制御 ===== */

const tooltips=document.querySelectorAll(".tooltip");

tooltips.forEach(el=>{
el.addEventListener("click",function(e){

if(window.innerWidth<=768){

if(el.closest(".social-links")){
if(!el.classList.contains("show")){
e.preventDefault();
document.querySelectorAll(".tooltip").forEach(t=>t.classList.remove("show"));
el.classList.add("show");
}else{
el.classList.remove("show");
}
}else{
document.querySelectorAll(".tooltip").forEach(t=>t.classList.remove("show"));
el.classList.add("show");
}

}

});
});

document.addEventListener("click",function(e){
if(!e.target.closest(".tooltip")){
document.querySelectorAll(".tooltip").forEach(t=>t.classList.remove("show"));
}
});

</script>
